<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="ape-title ape-desc">
  <title id="ape-title">APE monogram</title>
  <desc id="ape-desc">The letters A, P and E overlapping on shared baselines, for Alessandro Pecora.</desc>
  <rect x="6" y="6" width="52" height="52" rx="10" fill="#f3efe5" stroke="#191915" stroke-width="2"/>

  <!-- Ink-trap accent at the A apex: a small red wedge tucked into the flat-cut vertex -->
  <path d="M33,15 L35,15 L34,18.4 Z" fill="#9b3f2f"/>

  <g fill="none" stroke="#191915" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- A: legs meet a flat-cut apex (ink trap) instead of a sharp point -->
    <path d="M14,50 L33,15"/>
    <path d="M35,15 L44,50"/>
    <path d="M33,15 L35,15"/>
    <!-- A: crossbar, endpoints computed exactly on the two legs -->
    <path d="M22,36 L40,36"/>

    <!-- P/E shared spine -->
    <path d="M26,15 L26,50"/>
    <!-- P: bowl closes back onto the spine -->
    <path d="M26,15 C37,15 43,18.5 43,23 C43,27.5 37,31 26,31"/>
    <!-- E: top arm, shared with the A apex baseline -->
    <path d="M26,15 L44,15"/>
    <!-- E: middle arm -->
    <path d="M26,32 L40,32"/>
    <!-- E: bottom arm, shared with the A right foot -->
    <path d="M26,50 L44,50"/>
  </g>
</svg>
