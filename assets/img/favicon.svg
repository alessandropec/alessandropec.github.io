<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 104 52" role="img" aria-labelledby="title">
  <title id="title">APE monogram</title>
  <rect x="1" y="1" width="102" height="50" rx="10" fill="#f3efe5" stroke="#191915" stroke-width="2"/>
  <g fill="none" stroke="#191915" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter">
    <!-- A: the right leg is also the spine from which the P grows. -->
    <path d="M10 40 24 11 38 40M15 30h18"/>
    <!-- P shares the A's terminal and flows into the upper arm of the E. -->
    <path d="M38 40V11h12c9 0 12 4 12 9s-3 9-12 9H38M62 11h30M67 11v29h25M67 25h20"/>
  </g>
</svg>
