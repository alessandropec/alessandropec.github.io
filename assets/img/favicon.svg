<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">APE monogram</title>
  <!-- A compact editorial chip: clipped corners, one continuous shared spine. -->
  <path d="M12 2h40l10 10v40L52 62H12L2 52V12Z" fill="#f3efe5" stroke="#191915" stroke-width="2"/>
  <path d="M2 25h4M2 39h4M58 25h4M58 39h4" stroke="#191915" stroke-width="2"/>
  <g fill="none" stroke="#191915" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- A: diagonal and crossbar meet the shared vertical spine. -->
    <path d="M11 49 25 13 25 50M16 36h9"/>
    <!-- P: the upper bowl grows directly from that spine. -->
    <path d="M25 14h10c8 0 13 4 13 10s-5 10-13 10H25"/>
    <!-- E: the same spine continues into its middle and lower arms. -->
    <path d="M25 36h19M25 50h23"/>
  </g>
</svg>
