<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">APE continuous-line monogram</title>
  <desc id="desc">The letters A, P and E drawn as one uninterrupted line inside a square.</desc>
  <rect x="6" y="6" width="52" height="52" rx="5" fill="#f3efe5" stroke="#191915" stroke-width="2"/>
  <!-- One path only. Repeated sections sit on the exact same axis, so every junction is clean. -->
  <path
    d="M13 49 L27 15 L27 49 L27 34 L19 34 L27 34 L27 17 L38 17 C44 17 48 20 48 24.5 C48 29 44 32 38 32 L27 32 L46 32 L27 32 L27 49 L50 49"
    fill="none"
    stroke="#191915"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
