<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">APE monogram</title>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="#f3efe5" stroke="#191915" stroke-width="2"/>
  <g fill="none" stroke="#191915" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter">
    <!-- A: the right leg is also the spine from which the P grows. -->
    <path d="M7 47 16 17l9 30M10.5 35h11"/>
    <!-- P shares the A's terminal and flows into the upper arm of the E. -->
    <path d="M25 47V17h7c7 0 10 4 10 9s-3 9-10 9h-7M42 17h15M46 17v30h12M46 32h10"/>
  </g>
</svg>
